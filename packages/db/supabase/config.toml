project_id = "wargame-esq"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

# Passkey / WebAuthn support — currently DISABLED at the
# Management-API layer for this project. The hosted project rejects
# `config push` with HTTP 400 "Passkey configuration is not
# currently available", which is a Supabase-side rollout gate, not
# a config error on our end. The SDK methods (signInWithPasskey,
# auth.passkey.*) still exist in supabase-js but will throw at
# runtime until Supabase enables the feature on this project.
#
# When that happens (watch the Auth changelog or the API's response
# to `config push`), uncomment both blocks and re-run
# `bun run db:config`. lib/passkeys.ts and the UI are already wired.
#
# [auth.passkey]
# enabled = true
#
# [auth.webauthn]
# rp_display_name = "Wargame"
# rp_id = "localhost"
# rp_origins = ["http://localhost:3000"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 1200

# Custom OTP/magic-link template. {{ .Token }} renders the 6-digit
# code; {{ .Email }} the recipient address. We only use OTP (token);
# the magic link confirmation URL is unused.
[auth.email.template.magic_link]
subject = "Your Wargame sign-in code"
content_path = "./supabase/templates/magic_link.html"

[storage]
enabled = true
file_size_limit = "50MiB"
